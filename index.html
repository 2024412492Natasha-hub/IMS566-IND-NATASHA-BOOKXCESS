<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXcess - Secure Access Gateway</title>
    <meta name="description" content="IMS566 Automated Library Application - Optimized Login Interface with Vanta Waves Background">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="layout.css" rel="stylesheet">

    <style>
        /* CSS Extension Isolation for Vanta Integration Layer */
        #vanta-canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Positions waves behind all text/form layers */
            transition: background-color 0.3s ease;
        }
        
        /* Ensures body base canvas is transparent so Vanta stays visible underneath */
        body.vanta-active-body {
            background-color: transparent !important;
        }

        /* Adds subtle card backdrop blur for high readability over animated waves */
        .auth-panel-card {
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.85);
        }

        [data-theme="dark"] .auth-panel-card {
            background-color: rgba(30, 41, 59, 0.85);
        }
    </style>
</head>
<body class="vanta-active-body">

    <div id="vanta-canvas-bg"></div>

    <div class="container d-flex justify-content-end pt-3 px-4" style="position: relative; z-index: 10;">
        <button class="theme-utility-btn" onclick="toggleSystemTheme()" aria-label="Toggle structural appearance theme">
            <i id="themeToggleIcon" class="bi bi-moon-stars-fill"></i>
        </button>
    </div>

    <main class="application-view-wrapper container auth-viewport-centering-container" style="position: relative; z-index: 5;">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
            <section class="card auth-panel-card">
                <div class="card-body p-4 p-sm-5">
                    
                    <header class="text-center mb-4">
                        <div class="auth-badge-graphic-icon">
                            <i class="bi bi-shield-lock-fill fs-3"></i>
                        </div>
                        <h3 class="fw-bold text-dark mb-1">Gatekeeper Access</h3>
                        <p class="text-secondary small mb-0">IMS566 Automated Library Portal System</p>
                    </header>

                    <div id="dynamicErrorFeedbackAlert" class="alert alert-danger d-none align-items-center rounded-3 mb-4" role="alert">
                        <i class="bi bi-exclamation-octagon-fill me-2 flex-shrink-0"></i>
                        <div class="small">Authentication failed. Check your security tokens.</div>
                    </div>

                    <form id="systemLoginForm" onsubmit="executeClientAuthentication(event)">
                        <div class="mb-3">
                            <label for="usernameFieldInput" class="form-label small fw-semibold text-secondary">Operator Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-person-fill"></i></span>
                                <input type="text" class="form-control bg-transparent border-start-0 text-dark" id="usernameFieldInput" placeholder="Enter 'admin'" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="passwordFieldInput" class="form-label small fw-semibold text-secondary">Security Password Code</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-key-fill"></i></span>
                                <input type="password" class="form-control bg-transparent border-start-0 text-dark" id="passwordFieldInput" placeholder="Enter 'password123'" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold shadow-sm rounded-3">Initialize Session</button>
                    </form>
                    
                </div>
            </section>
        </div>
    </main>

    <footer class="text-white-50 text-center py-4 mt-auto" style="position: relative; z-index: 5;">
        <div class="container px-4">
            <p class="mb-1 text-white small fw-semibold">&copy; 2026 LibManage Architecture Core Framework. All Rights Reserved.</p>
            <p class="mb-0 text-muted extra-small text-uppercase tracking-wider">Advanced Web Design Assignment Hub | Universiti Teknologi MARA (UiTM)</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

    <script>
        // Global Reference Variable for managing the Vanta Engine Instance Lifecycle 
        let globalVantaEffectInstance = null;

        // Color Hex Definitions mapped explicitly to your layout.css theme properties
        const LIGHT_CANVAS_COLOR = 0xf8fafc;
        const DARK_CANVAS_COLOR = 0x0f172a;
        const BRAND_PRIMARY_BLUE = 0x0d6efd;

        /**
         * Initializes the Vanta Waves animation background context safely.
         */
        function initializeVantaBackground(targetBackgroundColor) {
            globalVantaEffectInstance = VANTA.WAVES({
                el: "#vanta-canvas-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color: BRAND_PRIMARY_BLUE,
                shininess: 35.00,
                waveHeight: 12.00,
                waveSpeed: 0.60,
                backgroundColor: targetBackgroundColor
            });
        }

        // Evaluate user preference history on application startup routines
        const rootElement = document.documentElement;
        const themeIcon = document.getElementById('themeToggleIcon');
        let initialBgColor = LIGHT_CANVAS_COLOR;

        if (localStorage.getItem('themePreference') === 'dark') {
            rootElement.setAttribute('data-theme', 'dark');
            themeIcon.className = "bi bi-sun-fill";
            initialBgColor = DARK_CANVAS_COLOR;
        }

        // Initialize the wave canvas with the computed starting background color
        initializeVantaBackground(initialBgColor);

        /**
         * Dynamic Theme Toggle Tool Option
         */
        function toggleSystemTheme() {
            if (rootElement.getAttribute('data-theme') === 'dark') {
                rootElement.setAttribute('data-theme', 'light');
                themeIcon.className = "bi bi-moon-stars-fill";
                localStorage.setItem('themePreference', 'light');
                
                // Dynamically modify Vanta properties at runtime matching light mode parameters
                if (globalVantaEffectInstance) {
                    globalVantaEffectInstance.setOptions({
                        backgroundColor: LIGHT_CANVAS_COLOR
                    });
                }
            } else {
                rootElement.setAttribute('data-theme', 'dark');
                themeIcon.className = "bi bi-sun-fill";
                localStorage.setItem('themePreference', 'dark');
                
                // Dynamically modify Vanta properties at runtime matching dark mode parameters
                if (globalVantaEffectInstance) {
                    globalVantaEffectInstance.setOptions({
                        backgroundColor: DARK_CANVAS_COLOR
                    });
                }
            }
        }

        /**
         * Authentication Logic Simulated Operations Block
         */
        function executeClientAuthentication(event) {
            event.preventDefault();
            const rawUserToken = document.getElementById('usernameFieldInput').value.trim();
            const rawPassToken = document.getElementById('passwordFieldInput').value;
            const errorUIPanel = document.getElementById('dynamicErrorFeedbackAlert');

            if (rawUserToken === 'admin' && rawPassToken === 'password123') {
                errorUIPanel.classList.add('d-none');
                
                // Destroy the engine gracefully before page navigation to free system memory buffers
                if (globalVantaEffectInstance) {
                    globalVantaEffectInstance.destroy();
                }
                
                window.location.href = 'dashboard.html';
            } else {
                errorUIPanel.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
